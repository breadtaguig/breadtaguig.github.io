<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="manifest" href="/static/site.webmanifest">
</head>

<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-custom-blue mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">BREAD Society Taguig</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="event-generate.html">Events Advisory Generation</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="events.html">Upcoming Events</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="surveys.html">Survey</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<button class="toggle floating-btn" onclick="toggleDark()">🌙</button>

<div class="container">
  <h2 class="mb-3 text-center">Survey Format Generator</h2>

  <input id="group" placeholder="Group (Organizer)" class="form-control" />
  <input id="title" placeholder="Event Title" class="form-control" />
  <input id="date" placeholder="Date" type="date" class="form-control" />
  <input id="time" placeholder="Time" class="form-control" />
  <input id="venue" placeholder="Venue" class="form-control" />
  <input id="calltime" placeholder="Call Time" class="form-control" />
  <input id="uniform" placeholder="Uniform" class="form-control" />
  <input id="who" placeholder="Who" class="form-control" />
  <textarea id="notes" placeholder="Attendees" class="form-control"></textarea>
  <input id="poster" placeholder="Poster Link (optional)" class="form-control" />
  <input id="gmaps" placeholder="Google Maps Link (optional)" class="form-control" />
  <textarea id="cc" placeholder="CC (optional)" class="form-control"></textarea>

  <div class="d-grid gap-2">
    <button onclick="generateMessage()">Generate</button>
  </div>
  
  <h3 class="mt-3">Output</h3>
  <textarea id="output" readonly class="form-control"></textarea>
  
  <div id="alertPlaceholder" class="mt-3"></div>
  <div class="d-grid gap-2">
    <button onclick="copyMessage()">Copy to Clipboard</button>
  </div><br>
  
  <div class="d-grid gap-2">
    <button onclick="exportText()">Export .txt</button>
    <button onclick="exportMD()">Export .md</button>
  </div>
</div><br>

<br><footer class="mt-auto py-2" style="background-color: #347aee;">
  <div class="footer-container d-flex justify-content-center align-items-center gap-3 flex-wrap text-white">
    <!-- Left side: YouTube & Facebook -->
    <div class="d-flex align-items-center gap-2">
      <a href="https://youtube.com/@mcgibread" target="_blank" class="text-white">
        <i class="bi bi-youtube"></i>
      </a>
      <a href="https://facebook.com/mcgibread" target="_blank" class="text-white">
        <i class="bi bi-facebook"></i>
      </a>
      <span>/mcgibread</span>
    </div>

    <!-- Right side: Instagram, X, Email -->
    <div class="d-flex align-items-center gap-2">
      <a href="https://instagram.com/mcgibread" target="_blank" class="text-white">
        <i class="bi bi-instagram"></i>
      </a>
      <a href="https://x.com/mcgibread" target="_blank" class="text-white">
        <i class="bi bi-x"></i>
      </a>
      <span>@mcgibread</span>
      <i class="bi bi-envelope-fill"></i>
      <span>bread@mcgi.org</span>
    </div>
  </div>
</footer>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
