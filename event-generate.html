<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BREAD Event Message Generator</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Main CSS -->
  <link href="main.css" rel="stylesheet">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="manifest" href="/static/site.webmanifest">
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-custom-blue mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">BREAD Society Taguig</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="event-generate.html">Events Advisory Generation</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="events.html">Upcoming Events</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <button class="toggle" onclick="toggleDark()">🌙</button>

  <div class="container">
    <h2 class="mb-3">Events Advisory Generator</h2>

    <input id="group" placeholder="Group" class="form-control" />
    <input id="title" placeholder="Event Title" class="form-control" />
    <input id="date" type="date" class="form-control" />
    <input id="time" placeholder="Time" class="form-control" />
    <input id="venue" placeholder="Venue" class="form-control" />
    <input id="calltime" placeholder="Call Time" class="form-control" />
    <input id="uniform" placeholder="Uniform" class="form-control" />
    <input id="who" placeholder="Who" class="form-control" />
    <textarea id="notes" placeholder="Other Notes..." class="form-control"></textarea>
    <input id="poster" placeholder="Poster Link (optional)" class="form-control" />
    <input id="gmaps" placeholder="Google Maps Link (optional)" class="form-control" />

    <div class="d-grid gap-2">
      <button onclick="generateMessage()">Generate</button>
      <button onclick="exportText()">Export .txt</button>
      <button onclick="exportMD()">Export .md</button>
    </div>
    
    <h3 class="mt-3">Output</h3>
    <textarea id="output" readonly class="form-control"></textarea>
    
    <div class="d-grid gap-2">
      <button onclick="copyMessage()">Copy to Clipboard</button>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
